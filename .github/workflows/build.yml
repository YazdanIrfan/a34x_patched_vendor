name: Build Patched Vendor

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device Model (e.g., SM-A346E)'
        required: true
        default: 'SM-A346E'
      region:
        description: 'Region/CSC (e.g., INS)'
        required: true
        default: 'INS'
  schedule:
    - cron: '0 0 * * 0' # Autonomous execution every Sunday at 00:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Maximum Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lz4 android-sdk-libsparse-utils erofs-utils p7zip-full

      - name: Install Rust Samloader
        run: |
          wget https://github.com/topjohnwu/samloader-rs/releases/latest/download/samloader-linux-x86_64.tar.xz
          tar -xf samloader-linux-x86_64.tar.xz
          sudo mv samloader /usr/local/bin/samloader
          sudo chmod +x /usr/local/bin/samloader

      - name: Install lpunpack
        run: |
          wget https://raw.githubusercontent.com/unix3dgforce/lpunpack/master/lpunpack.py
          sudo mv lpunpack.py /usr/local/bin/lpunpack.py

      - name: Retrieve and Decrypt Firmware
        run: |
          MODEL="${{ github.event.inputs.model || 'SM-A346E' }}"
          REGION="${{ github.event.inputs.region || 'INS' }}"
          
          # Wrap samloader in an automated 3-tier retry loop to absorb network drops
          for i in {1..3}; do
            echo "Attempt $i: Fetching firmware framework from Samsung servers..."
            if samloader download -m $MODEL -r $REGION -o decrypted_firmware.zip; then
              echo "SUCCESS: Full archive downloaded and decrypted cleanly."
              break
            fi
            
            echo "WARNING: Network connection dropped prematurely (UnexpectedEOF)."
            if [ $i -lt 3 ]; then
              echo "Waiting 20 seconds before attempting re-connection..."
              sleep 20
            else
              echo "ERROR: Failed to maintain a stable download after 3 attempts. Exiting."
              exit 1
            fi
          done
          
      - name: Extract Images
        run: |
          # 1. Extract AP tarball and aggressively delete the 7GB firmware zip
          unzip -q decrypted_firmware.zip "AP_*.tar.md5"
          rm decrypted_firmware.zip
          
          # 2. Extract super.img.lz4 and aggressively delete the 7GB AP tarball
          tar -xf AP_*.tar.md5 super.img.lz4
          rm AP_*.tar.md5
          
          # 3. Decompress lz4 and aggressively delete the compressed archive
          lz4 -d super.img.lz4 super.img
          rm super.img.lz4
          
          # 4. Convert sparse to raw using the C-binary (prevents Python RAM exhaustion)
          if file super.img | grep -q "sparse"; then
            simg2img super.img super_raw.img
            rm super.img # Delete the 10.7GB sparse image immediately
          else
            mv super.img super_raw.img
          fi
          
          # 5. Extract vendor, vendor_dlkm, and odm partitions from the raw super partition map
          mkdir extracted_super
          python3 /usr/local/bin/lpunpack.py -p vendor super_raw.img extracted_super
          python3 /usr/local/bin/lpunpack.py -p vendor_dlkm super_raw.img extracted_super
          python3 /usr/local/bin/lpunpack.py -p odm super_raw.img extracted_super
          
          # 6. Aggressively delete the 16GB raw super image to clear space for repackaging
          rm super_raw.img
          
          # Handle vendor.img sparse formatting
          if file extracted_super/vendor.img | grep -q "sparse"; then
            simg2img extracted_super/vendor.img vendor_raw.img
          else
            mv extracted_super/vendor.img vendor_raw.img
          fi

          # Handle vendor_dlkm.img sparse formatting
          if [ -f extracted_super/vendor_dlkm.img ]; then
            if file extracted_super/vendor_dlkm.img | grep -q "sparse"; then
              simg2img extracted_super/vendor_dlkm.img vendor_dlkm.img
            else
              mv extracted_super/vendor_dlkm.img vendor_dlkm.img
            fi
          fi

          # Handle odm.img sparse formatting
          if [ -f extracted_super/odm.img ]; then
            if file extracted_super/odm.img | grep -q "sparse"; then
              simg2img extracted_super/odm.img odm.img
            else
              mv extracted_super/odm.img odm.img
            fi
          fi

      - name: Patch Vendor Filesystem (Multi-TEE Bind-Mount)
        run: |
          mkdir vendor_mount vendor_tree
          
          # 1. Mount and Extract Stock Vendor
          sudo mount -t erofs vendor_raw.img vendor_mount || sudo mount -t ext4 vendor_raw.img vendor_mount
          sudo cp -a vendor_mount/. vendor_tree/
          sudo umount vendor_mount

          # 2. Recreate Base TEE Mount Point
          sudo rm -rf vendor_tree/tee
          sudo mkdir -p vendor_tree/tee
          
          # 3. Apply SELinux and Ownership to Base Mount Point
          sudo chown 0:2000 vendor_tree/tee
          sudo chmod 755 vendor_tree/tee
          sudo apt-get install -y attr
          sudo setfattr -n security.selinux -v "u:object_r:tee_file:s0" vendor_tree/tee || sudo chcon u:object_r:tee_file:s0 vendor_tree/tee

          # 4. Remove Stock Recovery Scripts
          sudo find vendor_tree/ -type f -name "recovery-from-boot.p" -delete
          sudo find vendor_tree/ -type f -name "*recovery*boot.p" -delete
          sudo find vendor_tree/ -type f -name "install-recovery.sh" -delete

          # 5. Inject Fede2782's Multi-TEE Payloads
          sudo cp -a patches/tee/vendor/tee_* vendor_tree/
          sudo cp patches/tee/vendor/etc/init/tee_blobs.rc vendor_tree/etc/init/

          # --- CRITICAL: BIND-MOUNT PERMISSIONS & SELINUX ---
          # For the bind-mount to succeed, the older binaries MUST be root-owned and executable
          sudo chown -R 0:0 vendor_tree/tee_*
          sudo chmod -R 755 vendor_tree/tee_*
          
          # The init script that executes the bind-mount MUST strictly be 644
          sudo chown 0:0 vendor_tree/etc/init/tee_blobs.rc
          sudo chmod 644 vendor_tree/etc/init/tee_blobs.rc

          # Apply standard vendor contexts to the hidden TEE binaries so they can be mounted
          sudo setfattr -R -n security.selinux -v "u:object_r:vendor_file:s0" vendor_tree/tee_* 2>/dev/null || true
          
          # Label the RC script so Android's init daemon is allowed to read it
          sudo setfattr -n security.selinux -v "u:object_r:vendor_configs_file:s0" vendor_tree/etc/init/tee_blobs.rc 2>/dev/null || true
          # --------------------------------------------------

          # 6. Inject SELinux Bind-Mount Exceptions (DYNAMIC CHANGED HERE)
          # This automatically reads the firmware target's actual SELinux tags to prevent compiler panics
          CIL_FILE="vendor_tree/etc/selinux/vendor_sepolicy.cil"
          if [ -f "$CIL_FILE" ] && ! sudo grep -q "tee_file (dir (mounton" "$CIL_FILE"; then
              INIT_TYPE=$(grep -oE '\(typeattributeset init_[a-zA-Z0-9_]*' "$CIL_FILE" | head -n 1 | awk '{print $2}')
              PRIV_TYPE=$(grep -oE '\(typeattributeset priv_app_[a-zA-Z0-9_]*' "$CIL_FILE" | head -n 1 | awk '{print $2}')
              
              # Secure fallbacks if string patterns aren't matched
              [ -z "$INIT_TYPE" ] && INIT_TYPE="init"
              [ -z "$PRIV_TYPE" ] && PRIV_TYPE="priv_app"

              sudo bash -c "echo '(allow $INIT_TYPE tee_file (dir (mounton)))' >> $CIL_FILE"
              sudo bash -c "echo '(allow $PRIV_TYPE tee_file (dir (getattr)))' >> $CIL_FILE"
          fi

          # 7. Inject Multi-TEE Properties
          PROP_FILE="vendor_tree/etc/build.prop"
          [ ! -f "$PROP_FILE" ] && PROP_FILE="vendor_tree/build.prop"

          BOOTLOADERS=$(cat patches/tee/supported_bootloaders | tr '\n' ',' | sed 's/,$//')
          sudo bash -c "echo 'ro.vendor.multitee.supported_bootloaders=$BOOTLOADERS' >> $PROP_FILE"

          if [ -f "patches/tee/module.prop" ]; then
              VERSION=$(grep 'version=' patches/tee/module.prop | sed 's/version=//')
              sudo bash -c "echo 'ro.vendor.multitee.version=$VERSION' >> $PROP_FILE"
          else
              sudo bash -c "echo 'ro.vendor.multitee.version=Fede2782-Port' >> $PROP_FILE"
          fi
          
      - name: Rebuild Vendor Image (EROFS)
        run: |
          sudo mkfs.erofs -zlz4hc vendor_patched.img vendor_tree/

      - name: Generate Release Tag
        id: tag
        run: |
          MODEL="${{ github.event.inputs.model || 'SM-A346E' }}"
          REGION="${{ github.event.inputs.region || 'INS' }}"
          echo "release_tag=${MODEL}_${REGION}_$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.release_tag }}
          name: "Patched Vendor Pack: ${{ env.release_tag }}"
          files: |
            vendor_patched.img
            vendor_dlkm.img
            odm.img
          draft: false
          prerelease: false
